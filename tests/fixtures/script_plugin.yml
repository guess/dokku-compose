plugins:
  letsencrypt:
    url: https://github.com/dokku/dokku-letsencrypt.git

services:
  letsencrypt:
    plugin: letsencrypt
    handler: scripts/letsencrypt.sh

apps:
  api:
    build:
      context: apps/api
    ports:
      - "https:4001:4000"
    letsencrypt:
      email: admin@example.com
