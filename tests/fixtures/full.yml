dokku:
  version: "0.35.12"
  plugins:
    postgres:
      url: https://github.com/dokku/dokku-postgres.git
      version: "1.41.0"
    redis:
      url: https://github.com/dokku/dokku-redis.git

networks:
  - studio-net
  - qultr-net

services:
  funqtion-postgres:
    plugin: postgres
    version: "17-3.5"
    image: postgis/postgis
  funqtion-redis:
    plugin: redis
    version: "7.2-alpine"
  studio-postgres:
    plugin: postgres
  studio-redis:
    plugin: redis
  qultr-postgres:
    plugin: postgres
  qultr-redis:
    plugin: redis

apps:
  funqtion:
    builder:
      dockerfile: docker/prod/api/Dockerfile
      app_json: docker/prod/api/app.json
      build_dir: apps/funqtion-api
      build_args:
        SENTRY_AUTH_TOKEN: "test-token"
    ports:
      - "https:4001:4000"
    certs: certs/funqtion.co
    links:
      - funqtion-postgres
      - funqtion-redis
    checks:
      wait-to-retire: 60
      attempts: 5
    registry:
      push-on-release: true
      server: registry.example.com
    env:
      APP_ENV: staging

  studio:
    builder:
      build_dir: apps/studio-api
    ports:
      - "https:4002:4000"
    certs: certs/strates.io
    links:
      - studio-postgres
      - studio-redis
    logs:
      max-size: "10m"
    networks:
      - studio-net

  qultr:
    builder:
      build_dir: apps/qultr-api
    ports:
      - "https:4003:4000"
    certs: certs/qultr.dev
    links:
      - qultr-postgres
      - qultr-redis
    nginx:
      client-max-body-size: "15m"
    scheduler: docker-local
    networks:
      - qultr-net

  qultr-sandbox:
    builder:
      dockerfile: docker/prod/sandbox/Dockerfile
      build_dir: apps/qultr-sandbox
    ports:
      - "http:4004:4000"
    networks:
      - qultr-net
